<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthPulse - 財富脈動</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #10B981;
      --negative: #EF4444;
    }
    body {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="text-white p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="text-center py-6 animate-fade-in">
      <h1 class="text-4xl font-bold text-emerald-400">💰 WealthPulse</h1>
      <p class="text-gray-400 mt-2">財富脈動 · 財務儀表板</p>
    </div>

    <!-- Net Worth Card -->
    <div class="card rounded-2xl p-8 mb-6 animate-fade-in" style="animation-delay: 0.1s">
      <p class="text-gray-400 text-center mb-2">淨資產 Net Worth</p>
      <h2 id="netWorth" class="text-5xl md:text-6xl font-bold text-center mb-4">載入中...</h2>
      
      <div id="changeContainer" class="flex justify-center">
        <div class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-gray-800">
          <span id="changeIcon" class="text-2xl">📊</span>
          <span id="changePercent" class="text-2xl font-bold">—</span>
          <span id="changeAmount" class="text-gray-400">—</span>
        </div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.2s">
        <p class="text-gray-400 text-sm mb-1">本月收入</p>
        <p id="totalIncome" class="text-2xl font-semibold text-emerald-400">—</p>
        <p class="text-xs text-gray-500 mt-2">薪水 + 股票 + 房租</p>
      </div>

      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.3s">
        <p class="text-gray-400 text-sm mb-1">本月支出</p>
        <p id="totalExpenses" class="text-2xl font-semibold text-red-400">—</p>
        <p class="text-xs text-gray-500 mt-2">來自 Notion</p>
      </div>

      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.4s">
        <p class="text-gray-400 text-sm mb-1">本月結餘</p>
        <p id="monthBalance" class="text-2xl font-semibold">—</p>
        <p class="text-xs text-gray-500 mt-2">收入 - 支出</p>
      </div>
    </div>

    <!-- Stocks Section -->
    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.5s">
      <h3 class="text-xl font-semibold mb-4">📈 股票資產</h3>
      <div id="stocksList" class="space-y-3">
        <p class="text-gray-400">載入中...</p>
      </div>
    </div>

    <!-- Liabilities Section -->
    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.6s">
      <h3 class="text-xl font-semibold mb-4">🏦 負債</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>房貸餘額</span>
          <span id="mortgage" class="font-semibold text-red-400">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>信用卡負債</span>
          <span id="creditCard" class="font-semibold text-red-400">—</span>
        </div>
      </div>
    </div>

    <!-- Income Breakdown -->
    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.7s">
      <h3 class="text-xl font-semibold mb-4">💵 收入明細</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>薪水</span>
          <span id="salary" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>股票配息</span>
          <span id="dividend" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>房租收入</span>
          <span id="rent" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>股票市值</span>
          <span id="stockValue" class="font-semibold text-emerald-400">—</span>
        </div>
      </div>
    </div>

    <!-- Settings / Input Form -->
    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.8s">
      <h3 class="text-xl font-semibold mb-4">⚙️ 設定收入</h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">薪水</label>
          <input type="number" id="inputSalary" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="50000">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">股票配息</label>
          <input type="number" id="inputDividend" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="5000">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">房租收入</label>
          <input type="number" id="inputRent" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="15000">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">股票市值</label>
          <input type="number" id="inputStockValue" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="350000">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">房貸餘額</label>
          <input type="number" id="inputMortgage" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="500000">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">信用卡負債</label>
          <input type="number" id="inputCreditCard" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="0">
        </div>
      </div>
      <button onclick="saveIncome()" class="mt-4 w-full px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg transition font-semibold">
        儲存 💾
      </button>
    </div>

    <!-- Footer -->
    <div class="text-center text-gray-500 text-sm py-4">
      <p>資料更新時間：<span id="updateTime">—</span></p>
      <button onclick="loadData()" class="mt-3 px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg transition">
        重新整理 🔄
      </button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';

    function formatNumber(num) {
      if (num === null || num === undefined) return '—';
      return new Intl.NumberFormat('zh-TW', {
        style: 'currency',
        currency: 'TWD',
        maximumFractionDigits: 0
      }).format(num);
    }

    async function loadData() {
      try {
        const [summaryRes, stocksRes] = await Promise.all([
          fetch(`${API_BASE}/finance/summary`),
          fetch(`${API_BASE}/stock/prices`)
        ]);

        const data = await summaryRes.json();
        const stocks = await stocksRes.json();

        // Update UI
        document.getElementById('netWorth').textContent = formatNumber(data.netWorth);
        
        const changePercent = data.monthChangePercent || 0;
        const isPositive = changePercent >= 0;
        
        document.getElementById('changeIcon').textContent = isPositive ? '📈' : '📉';
        document.getElementById('changePercent').textContent = `${isPositive ? '+' : ''}${changePercent}%`;
        document.getElementById('changePercent').className = `text-2xl font-bold ${isPositive ? 'text-emerald-400' : 'text-red-400'}`;
        document.getElementById('changeAmount').textContent = `(${formatNumber(data.monthChange)})`;

        const totalIncome = (data.income?.salary || 0) + (data.income?.dividend || 0) + (data.income?.rent || 0) + (data.income?.stockValue || 0);
        document.getElementById('totalIncome').textContent = formatNumber(totalIncome);
        document.getElementById('totalExpenses').textContent = formatNumber(data.expenses);
        
        const monthBalance = totalIncome - data.expenses;
        document.getElementById('monthBalance').textContent = formatNumber(monthBalance);
        document.getElementById('monthBalance').className = `text-2xl font-semibold ${monthBalance >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

        document.getElementById('salary').textContent = formatNumber(data.income?.salary);
        document.getElementById('dividend').textContent = formatNumber(data.income?.dividend);
        document.getElementById('rent').textContent = formatNumber(data.income?.rent);
        document.getElementById('stockValue').textContent = formatNumber(data.income?.stockValue);

        document.getElementById('mortgage').textContent = formatNumber(data.liabilities?.mortgage);
        document.getElementById('creditCard').textContent = formatNumber(data.liabilities?.creditCard);

        // Stocks list
        const stocksHtml = stocks.map(s => `
          <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
            <div>
              <p class="font-semibold">${s.code}</p>
              <p class="text-sm text-gray-400">${s.name || ''} · ${s.shares} 股</p>
            </div>
            <div class="text-right">
              <p class="font-semibold">${formatNumber(s.value)}</p>
              <p class="text-sm ${(s.change || 0) >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                ${(s.change || 0) >= 0 ? '↑' : '↓'} ${Math.abs(s.change || 0).toFixed(2)}%
              </p>
            </div>
          </div>
        `).join('');
        document.getElementById('stocksList').innerHTML = stocksHtml;

        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');

      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('netWorth').textContent = '載入失敗';
      }
    }

    // Load on start
    loadData();
  </script>

  <script>
    async function saveIncome() {
      const data = {
        salary: document.getElementById('inputSalary').value,
        dividend: document.getElementById('inputDividend').value,
        rent: document.getElementById('inputRent').value,
        stockValue: document.getElementById('inputStockValue').value,
        mortgage: document.getElementById('inputMortgage').value,
        creditCard: document.getElementById('inputCreditCard').value
      };

      try {
        const res = await fetch(`${API_BASE}/finance/income`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          alert('✅ 儲存成功！');
          loadData(); // 重新載入資料
        }
      } catch (e) {
        alert('儲存失敗：' + e.message);
      }
    }
  </script>
</body>
</html>
