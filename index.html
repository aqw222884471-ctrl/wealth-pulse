<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthPulse - 財富脈動</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --primary: #10B981; --negative: #EF4444; }
    body { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="text-white p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <div class="text-center py-6 animate-fade-in">
      <h1 class="text-4xl font-bold text-emerald-400">💰 WealthPulse</h1>
      <p class="text-gray-400 mt-2">財富脈動 · 財務儀表板</p>
    </div>

    <div class="card rounded-2xl p-8 mb-6 animate-fade-in" style="animation-delay: 0.1s">
      <p class="text-gray-400 text-center mb-2">淨資產 Net Worth</p>
      <h2 id="netWorth" class="text-5xl md:text-6xl font-bold text-center mb-4">—</h2>
      <div class="flex justify-center">
        <div class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-gray-800">
          <span id="changeIcon" class="text-2xl">📊</span>
          <span id="changePercent" class="text-2xl font-bold">—</span>
          <span id="changeAmount" class="text-gray-400">—</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.2s">
        <p class="text-gray-400 text-sm mb-1">本月收入</p>
        <p id="totalIncome" class="text-2xl font-semibold text-emerald-400">—</p>
      </div>
      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.3s">
        <p class="text-gray-400 text-sm mb-1">本月支出</p>
        <p id="totalExpenses" class="text-2xl font-semibold text-red-400">—</p>
      </div>
      <div class="card rounded-xl p-6 animate-fade-in" style="animation-delay: 0.4s">
        <p class="text-gray-400 text-sm mb-1">本月結餘</p>
        <p id="monthBalance" class="text-2xl font-semibold">—</p>
      </div>
    </div>

    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.5s">
      <h3 class="text-xl font-semibold mb-4">📈 股票資產</h3>
      <div id="stocksList" class="space-y-3"></div>
    </div>

    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.6s">
      <h3 class="text-xl font-semibold mb-4">🏦 負債</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>房貸餘額</span>
          <span id="mortgage" class="font-semibold text-red-400">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>信用卡負債</span>
          <span id="creditCard" class="font-semibold text-red-400">—</span>
        </div>
      </div>
    </div>

    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.7s">
      <h3 class="text-xl font-semibold mb-4">💵 收入明細</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>薪水</span>
          <span id="salary" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>股票配息</span>
          <span id="dividend" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>房租收入</span>
          <span id="rent" class="font-semibold">—</span>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <span>股票市值</span>
          <span id="stockValue" class="font-semibold text-emerald-400">—</span>
        </div>
      </div>
    </div>

    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.8s">
      <h3 class="text-xl font-semibold mb-4">⚙️ 設定收入</h3>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm text-gray-400 mb-1">薪水</label><input type="number" id="inputSalary" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
        <div><label class="block text-sm text-gray-400 mb-1">股票配息</label><input type="number" id="inputDividend" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
        <div><label class="block text-sm text-gray-400 mb-1">房租收入</label><input type="number" id="inputRent" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
        <div><label class="block text-sm text-gray-400 mb-1">股票市值</label><input type="number" id="inputStockValue" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
        <div><label class="block text-sm text-gray-400 mb-1">房貸餘額</label><input type="number" id="inputMortgage" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
        <div><label class="block text-sm text-gray-400 mb-1">信用卡負債</label><input type="number" id="inputCreditCard" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white"></div>
      </div>
      <button onclick="saveData()" class="mt-4 w-full px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg transition font-semibold">儲存 💾</button>
    </div>

    <div class="card rounded-xl p-6 mb-6 animate-fade-in" style="animation-delay: 0.9s">
      <h3 class="text-xl font-semibold mb-4">📝 支出記錄（來自 Notion）</h3>
      <p class="text-gray-400 text-sm">本月支出：<span id="notionExpenses">載入中...</span></p>
      <p class="text-gray-500 text-xs mt-2">* 支出資料從 Notion 同步</p>
    </div>

    <div class="text-center text-gray-500 text-sm py-4">
      <p>資料更新時間：<span id="updateTime">—</span></p>
      <button onclick="loadData()" class="mt-3 px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg transition">重新整理 🔄</button>
    </div>
  </div>

  <script>
    // 預設資料
    const defaultData = {
      salary: 50000, dividend: 5000, rent: 15000, stockValue: 350000,
      mortgage: 500000, creditCard: 0, lastMonthNetWorth: 900000
    };

    function formatNumber(num) {
      if (num === null || num === undefined || isNaN(num)) return '—';
      return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(num);
    }

    function loadData() {
      const saved = localStorage.getItem('wealthPulseData');
      const data = saved ? JSON.parse(saved) : defaultData;
      
      // 計算
      const totalIncome = data.salary + data.dividend + data.rent;
      const totalAssets = totalIncome + data.stockValue;
      const totalLiabilities = data.mortgage + data.creditCard;
      const netWorth = totalAssets - totalLiabilities;
      const monthChange = netWorth - data.lastMonthNetWorth;
      const monthChangePercent = data.lastMonthNetWorth > 0 ? ((monthChange / data.lastMonthNetWorth) * 100).toFixed(1) : 0;
      
      // 更新 UI
      document.getElementById('netWorth').textContent = formatNumber(netWorth);
      
      const isPositive = monthChange >= 0;
      document.getElementById('changeIcon').textContent = isPositive ? '📈' : '📉';
      document.getElementById('changePercent').textContent = `${isPositive ? '+' : ''}${monthChangePercent}%`;
      document.getElementById('changePercent').className = `text-2xl font-bold ${isPositive ? 'text-emerald-400' : 'text-red-400'}`;
      document.getElementById('changeAmount').textContent = `(${formatNumber(monthChange)})`;

      document.getElementById('totalIncome').textContent = formatNumber(totalIncome);
      document.getElementById('totalExpenses').textContent = '載入中...'; // 從 Notion
      document.getElementById('monthBalance').textContent = '載入中...';

      document.getElementById('salary').textContent = formatNumber(data.salary);
      document.getElementById('dividend').textContent = formatNumber(data.dividend);
      document.getElementById('rent').textContent = formatNumber(data.rent);
      document.getElementById('stockValue').textContent = formatNumber(data.stockValue);
      document.getElementById('mortgage').textContent = formatNumber(data.mortgage);
      document.getElementById('creditCard').textContent = formatNumber(data.creditCard);

      // 股票列表
      document.getElementById('stocksList').innerHTML = `
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <div><p class="font-semibold">2330.TW</p><p class="text-sm text-gray-400">台積電</p></div>
          <div class="text-right"><p class="font-semibold">${formatNumber(data.stockValue * 0.8)}</p><p class="text-sm text-emerald-400">↑ 2.5%</p></div>
        </div>
        <div class="flex justify-between items-center p-3 bg-gray-800/50 rounded-lg">
          <div><p class="font-semibold">其他</p><p class="text-sm text-gray-400">其他股票</p></div>
          <div class="text-right"><p class="font-semibold">${formatNumber(data.stockValue * 0.2)}</p><p class="text-sm text-emerald-400">↑ 1.0%</p></div>
        </div>
      `;

      // 填入輸入框
      document.getElementById('inputSalary').value = data.salary;
      document.getElementById('inputDividend').value = data.dividend;
      document.getElementById('inputRent').value = data.rent;
      document.getElementById('inputStockValue').value = data.stockValue;
      document.getElementById('inputMortgage').value = data.mortgage;
      document.getElementById('inputCreditCard').value = data.creditCard;

      document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');
      
      // 嘗試從 Notion 取得支出（需要後端）
      fetchNotionExpenses();
    }

    async function fetchNotionExpenses() {
      // 這裡可以之後串接 Notion API
      // 目前先顯示範例資料
      document.getElementById('notionExpenses').textContent = '需串接 Notion API';
      document.getElementById('totalExpenses').textContent = '需串接 Notion';
      document.getElementById('monthBalance').textContent = '需串接 Notion';
    }

    function saveData() {
      const data = {
        salary: parseInt(document.getElementById('inputSalary').value) || 0,
        dividend: parseInt(document.getElementById('inputDividend').value) || 0,
        rent: parseInt(document.getElementById('inputRent').value) || 0,
        stockValue: parseInt(document.getElementById('inputStockValue').value) || 0,
        mortgage: parseInt(document.getElementById('inputMortgage').value) || 0,
        creditCard: parseInt(document.getElementById('inputCreditCard').value) || 0,
        lastMonthNetWorth: 900000
      };
      localStorage.setItem('wealthPulseData', JSON.stringify(data));
      alert('✅ 儲存成功！');
      loadData();
    }

    loadData();
  </script>
</body>
</html>
